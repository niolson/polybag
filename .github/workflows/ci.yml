name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, zip, gd, intl, bcmath, pcntl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Audit PHP dependencies
        run: composer audit

      - name: Audit npm dependencies
        run: npm audit

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          tags: polybag-app:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: nginx
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan app image for CVEs
        uses: anchore/scan-action@v6
        with:
          image: polybag-app:ci
          severity-cutoff: high
          only-fixed: true
          fail-build: true
