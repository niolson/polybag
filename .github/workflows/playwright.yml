name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: shipping_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's|^APP_URL=.*|APP_URL=http://127.0.0.1:8765|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=shipping_test|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=password|' .env
          sed -i 's|^SESSION_DRIVER=.*|SESSION_DRIVER=database|' .env
          sed -i 's|^QUEUE_CONNECTION=.*|QUEUE_CONNECTION=sync|' .env
          sed -i 's|^CACHE_STORE=.*|CACHE_STORE=file|' .env
          sed -i 's|^FAKE_CARRIERS=.*|FAKE_CARRIERS=true|' .env

      - name: Generate app key & migrate
        run: |
          php artisan key:generate
          php artisan migrate:fresh --seed --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Node dependencies & build
        run: |
          npm ci
          npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: |
          php artisan serve --port=8765 &
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:8765 > /dev/null && break
            sleep 1
          done

      - name: Verify server
        run: |
          curl -s http://127.0.0.1:8765/api/health | head -20
          php artisan route:list --path=api

      - name: Run Playwright tests
        run: npx playwright test
        env:
          APP_URL: http://127.0.0.1:8765

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
