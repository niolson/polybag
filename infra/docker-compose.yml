# Shared Infrastructure — MySQL + Redis
# Deploy to /opt/shared/ on the server
#
# Usage:
#   cd /opt/shared && docker compose up -d

services:
  shared-mysql:
    image: mysql:8.4@sha256:77e7fd3d377ad2d9e7983d457b71ff8a04c0f19e41948d722f15c508a48dcce3
    container_name: shared-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-keyring:/var/lib/mysql-keyring
      - ./mysql.cnf:/etc/mysql/conf.d/encryption.cnf:ro
    networks:
      - shared
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  shared-redis:
    image: redis:alpine@sha256:883c7c980a2ff698f71c95cada99f968a54483ce5baad707b65877cfe0c98f1c
    container_name: shared-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  mysql-keyring:
  redis-data:

networks:
  shared:
    external: true
