services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env
      - ${QZ_PRIVATE_KEY_PATH:-./storage/app/private/qz-private-key.pem}:/var/www/html/storage/app/private/qz-private-key.pem:ro
      - ${QZ_CERTIFICATE_PATH:-./public/qz-certificate.pem}:/var/www/html/public/qz-certificate.pem:ro
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - default
      - shared
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    restart: unless-stopped
    volumes:
      - ${QZ_CERTIFICATE_PATH:-./public/qz-certificate.pem}:/var/www/html/public/qz-certificate.pem:ro
    networks:
      - default
      - proxy
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    profiles: [standalone]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    profiles: [standalone]
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env
    entrypoint: ["sh", "-c", "php artisan config:cache && php artisan queue:work --tries=3"]
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - default
      - shared

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env
    entrypoint: ["sh", "-c", "php artisan config:cache && php artisan schedule:work"]
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - default
      - shared

volumes:
  mysql-data:
  redis-data:

networks:
  proxy:
    external: true
  shared:
    external: true
